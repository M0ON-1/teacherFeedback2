<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Відгук про пару — Студент</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="card">
    <h1>Відгук про пару</h1>

    <div id="status" class="muted">Перевіряємо чи приймаються відгуки...</div>

    <form id="feedbackForm">
      <label>Оцінка (1–5)</label>
      <div class="rating">
        <label><input type="radio" name="rating" value="1" />1</label>
        <label><input type="radio" name="rating" value="2" />2</label>
        <label><input type="radio" name="rating" value="3" />3</label>
        <label><input type="radio" name="rating" value="4" />4</label>
        <label><input type="radio" name="rating" value="5" checked />5</label>
      </div>

      <label for="comment">Коментар (необов'язково)</label>
      <textarea id="comment" rows="5" placeholder="Що сподобалося / що покращити..."></textarea>

      <button id="sendBtn" type="submit">Відправити відгук</button>
    </form>

    <div id="msg" class="muted"></div>
  </main>

  <script type="module" src="student.js"></script>
</body>
</html>
